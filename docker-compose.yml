services:
  vmhq-mcp:
    image: ${VMHQ_MCP_IMAGE:-ghcr.io/vmhq/vmhq-mcp:latest}
    build:
      context: .
    env_file:
      - path: .env
        required: false
    ports:
      - "${HOST_PORT:-3010}:${MCP_PORT:-3010}"
    environment:
      MCP_OAUTH_STATE_PATH: ${MCP_OAUTH_STATE_PATH:-/app/data/oauth-state.json}
    volumes:
      - vmhq-mcp-data:/app/data
    restart: unless-stopped

volumes:
  vmhq-mcp-data:
